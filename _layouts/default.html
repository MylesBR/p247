<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N17N4BXHLN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-N17N4BXHLN');
  </script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="64x64">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="theme-color" content="#0A0F1E">

  <!-- HubSpot Forms -->
  <script charset="utf-8" type="text/javascript" src="https://js.hsforms.net/forms/embed/v2.js"></script>
  <style>
    .hs-form-private { max-width: 420px; margin: 0 auto; }
    .hs-form-private .hs-input {
      background: #1a2540 !important;
      border: 1px solid #2d3f5e !important;
      color: #fff !important;
      border-radius: 8px !important;
      padding: 13px 16px !important;
      font-size: 1rem !important;
      width: 100% !important;
    }
    .hs-form-private .hs-input:focus { outline: none !important; border-color: #00B4FF !important; }
    .hs-form-private .hs-input::placeholder { color: #5a6f8a !important; }
    .hs-form-private label { color: #a0b4cc !important; font-size: 0.9rem !important; }
    .hs-form-private .hs-error-msgs label { color: #ff6b6b !important; }
    .hs-form-private .hs-submit .actions { text-align: center !important; }
    .hs-form-private .hs-button {
      background: #FF6B00 !important; color: #fff !important; border: none !important;
      border-radius: 8px !important; padding: 14px 32px !important; font-size: 1.05rem !important;
      font-weight: 700 !important; cursor: pointer !important; width: 100% !important;
    }
    .hs-form-private .hs-button:hover { background: #e05e00 !important; }
    .hs-form-private .submitted-message { color: #4ADE80 !important; font-weight: 600 !important; text-align: center !important; }
    .hubspot-link__container, .hbspt-form + div[style], .hbspt-form ~ div a[href*="hubspot"] { display: none !important; }
  </style>

  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .site-header { border-top: none; border-bottom: 1px solid #eee; }
    .wrapper { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  </style>
</head>
<body>

  {% include header.html %}

  <main>{{ content }}</main>

  <footer style="background:#0A0F1E; color:#555; text-align:center; padding:32px 20px; margin-top:60px; font-size:0.85rem;">
    <p style="margin:0 0 8px;">
      <a href="https://x.com/p247ai" style="color:#555; text-decoration:none; margin:0 8px;">X / Twitter</a>
      <a href="https://instagram.com/p247ai" style="color:#555; text-decoration:none; margin:0 8px;">Instagram</a>
    </p>
    <p style="margin:0; color:#333;">© {{ 'now' | date: "%Y" }} P247. All rights reserved.</p>
  </footer>

</body>
</html>
