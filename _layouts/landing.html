<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- OG tags for social sharing -->
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N17N4BXHLN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-N17N4BXHLN');
  </script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png" sizes="64x64">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="theme-color" content="#0A0F1E">

  <!-- HubSpot Forms -->
  <script charset="utf-8" type="text/javascript" src="https://js.hsforms.net/forms/embed/v2.js"></script>

  <style>
    /* HubSpot form dark theme overrides */
    .hs-form-private { max-width: 420px; margin: 0 auto; }
    .hs-form-private .hs-input {
      background: #1a2540 !important;
      border: 1px solid #2d3f5e !important;
      color: #fff !important;
      border-radius: 8px !important;
      padding: 13px 16px !important;
      font-size: 1rem !important;
      font-family: inherit !important;
      width: 100% !important;
    }
    .hs-form-private .hs-input:focus {
      outline: none !important;
      border-color: #00B4FF !important;
    }
    .hs-form-private .hs-input::placeholder { color: #5a6f8a !important; }
    .hs-form-private label { color: #a0b4cc !important; font-size: 0.9rem !important; }
    .hs-form-private .hs-error-msgs label { color: #ff6b6b !important; }
    .hs-form-private .hs-submit .actions {
      text-align: center !important;
    }
    .hs-form-private .hs-button {
      background: #FF6B00 !important;
      color: #fff !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 14px 32px !important;
      font-size: 1.05rem !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      font-family: inherit !important;
      width: 100% !important;
      transition: background 0.15s !important;
    }
    .hs-form-private .hs-button:hover { background: #e05e00 !important; }
    .hs-form-private .hs-richtext { color: #a0b4cc !important; }
    .hs-form-private .submitted-message { color: #4ADE80 !important; font-weight: 600 !important; text-align: center !important; }
    /* Hide HubSpot branding */
    .hubspot-link__container,
    .sproket,
    .hs-form-private .legal-consent-container .hs-form-booleancheckbox-display > span,
    iframe[title="HubSpot Form"],
    .hbspt-form .sprocket-icon,
    .hs_cos_wrapper_type_form .hubspot-link__container { display: none !important; }
    .hbspt-form + div[style],
    .hbspt-form ~ div a[href*="hubspot"] { display: none !important; }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0A0F1E;
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
