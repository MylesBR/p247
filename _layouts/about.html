---
layout: default
---

<style>
  .about-hero { background: #0A0F1E; color: #fff; padding: 60px 20px 48px; text-align: center; margin: -1px; }
  .about-hero h1 { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .about-hero .accent { width: 48px; height: 4px; background: #FF6B00; margin: 16px auto 0; border-radius: 2px; }

  .about-body { max-width: 760px; margin: 48px auto 80px; padding: 0 24px; }
  .about-body p { color: #333; font-size: 1.05rem; line-height: 1.8; margin-bottom: 20px; }
  .about-body strong { color: #0A0F1E; }
  .about-body a { color: #FF6B00; font-weight: 600; text-decoration: none; }
  .about-body a:hover { color: #0A0F1E; }
  .about-body hr { border: none; border-top: 2px solid #f0f0f0; margin: 40px 0; }

  .about-cta { background: #0A0F1E; border-radius: 12px; padding: 40px; text-align: center; margin-top: 48px; }
  .about-cta p { color: #a0aec0; margin-bottom: 20px; font-size: 0.95rem; }
  .about-cta a { background: #FF6B00; color: #fff; font-weight: 700; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-size: 1rem; }
</style>

<div class="about-hero">
  <h1>{{ page.title }}</h1>
  <div class="accent"></div>
</div>

<div class="about-body">
  {{ content }}

  <div class="about-cta">
    <p>P247 is in early development. Be the first to know when we launch.</p>
    <a href="/">Join the Waitlist →</a>
  </div>
</div>
